buildscript {
    ext {
        buildToolsVersion = "36.0.0"
        minSdkVersion = 24
        compileSdkVersion = 36
        targetSdkVersion = 36
        ndkVersion = "27.1.12297006"
        kotlinVersion = "2.1.20"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin")
    }
}

apply plugin: "com.facebook.react.rootproject"

allprojects {
    repositories {
        google()
        mavenCentral()
        maven { url "${rootProject.projectDir}/../node_modules/@react-native-async-storage/async-storage/android/local_repo" }
    }
}

// AGP 8.7+ requires all modules (including dependencies) to declare compileSdk.
// This enforces it for any library that omits it (e.g. expo canary packages).
subprojects {
    plugins.withId("com.android.library") {
        android {
            compileSdk rootProject.ext.compileSdkVersion
        }
    }
}
