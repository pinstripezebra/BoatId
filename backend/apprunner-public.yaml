version: 1.0
runtime: python3
build:
  commands:
    build:
      - echo "Installing dependencies for BoatId FastAPI backend..."
      - pip install -r requirements.txt
run:
  runtime-version: 3.11
  command: uvicorn main:app --host 0.0.0.0 --port $PORT
  network:
    port: 8080
    env: PORT
  # No env variables here - they'll be set via deployment script